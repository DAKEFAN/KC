<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博物馆生存指南 V1.0</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #2c3e50;
            --accent: #3498db;
            --danger: #e74c3c;
            --success: #27ae60;
            --warning: #f1c40f;
            --text-main: #333;
            --text-sub: #666;
            --border-radius: 8px;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Header: 个人信息区 --- */
        header {
            background: var(--primary);
            color: white;
            padding: 15px;
            flex-shrink: 0;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .role-title {
            font-size: 1.2em;
            font-weight: bold;
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            font-size: 0.85em;
            text-align: center;
        }

        .stat-item span { display: block; font-weight: bold; font-size: 1.1em; }
        .stat-label { color: rgba(255,255,255,0.7); font-size: 0.9em; font-weight: normal !important;}

        /* --- Progress Bars for Health/Mood --- */
        .bars-area {
            padding: 10px 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }
        
        .bar-group {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            font-size: 0.85em;
        }
        .bar-label { width: 60px; }
        .progress-bg { flex: 1; height: 8px; background: #ddd; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.3s; }
        .bar-val { width: 35px; text-align: right; }

        /* --- Game Area --- */
        #game-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* --- Log --- */
        #log-box {
            flex: 1;
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: var(--border-radius);
            padding: 10px;
            overflow-y: auto;
            font-size: 0.9em;
            max-height: 40vh;
        }
        .log-line { margin-bottom: 6px; line-height: 1.4; border-bottom: 1px dashed #eee; padding-bottom: 4px; }
        .log-turn { font-weight: bold; color: var(--accent); margin-top: 10px; display: block; }
        .log-sys { color: var(--text-sub); font-style: italic; }
        .log-danger { color: var(--danger); }
        .log-success { color: var(--success); }

        /* --- Controls --- */
        #controls {
            padding: 15px;
            background: #fff;
            border-top: 1px solid #eee;
            flex-shrink: 0;
        }

        .section-title {
            font-size: 0.9em;
            color: var(--text-sub);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Default 3 cols */
            gap: 8px;
            margin-bottom: 15px;
        }

        button {
            border: none;
            background: white;
            border: 1px solid #ddd;
            padding: 10px 5px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
            color: var(--text-main);
            position: relative;
        }

        button:hover:not(:disabled) { background: #f0f0f0; border-color: #bbb; }
        button:active:not(:disabled) { transform: translateY(1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; background: #f5f5f5; }

        button.primary { background: var(--primary); color: white; border: none; }
        button.primary:hover { background: #34495e; }
        
        button.leisure { border-left: 3px solid var(--success); }
        button.work { border-left: 3px solid var(--accent); }
        button.research { border-left: 3px solid var(--warning); }

        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            font-size: 0.7em;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- Modal --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex; justify-content: center; align-items: center;
            z-index: 100;
        }
        .modal.hidden { display: none; }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 8px;
            width: 80%;
            max-width: 400px;
            text-align: center;
        }
        .modal h2 { margin-top: 0; color: var(--primary); }
        .choice-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: var(--bg-color);
            border: 1px solid #ddd;
        }

    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="header-top">
            <div>
                <div style="font-size:1.1em" id="ui-name">加载中...</div>
                <div style="font-size:0.8em; opacity:0.8" id="ui-education">学历</div>
            </div>
            <div class="role-title" id="ui-title">助理馆员</div>
        </div>
        <div class="stats-grid">
            <div class="stat-item"><span id="ui-sci">0</span><div class="stat-label">科研</div></div>
            <div class="stat-item"><span id="ui-admin">0</span><div class="stat-label">行政</div></div>
            <div class="stat-item"><span id="ui-rep">0</span><div class="stat-label">声望</div></div>
            <div class="stat-item"><span id="ui-money">10</span><div class="stat-label">金钱(万)</div></div>
        </div>
    </header>

    <div class="bars-area">
        <div class="bar-group">
            <div class="bar-label">❤️ 健康</div>
            <div class="progress-bg"><div class="progress-fill" id="bar-health" style="background:var(--danger); width:100%"></div></div>
            <div class="bar-val" id="val-health">100</div>
        </div>
        <div class="bar-group">
            <div class="bar-label">😃 愉悦</div>
            <div class="progress-bg"><div class="progress-fill" id="bar-mood" style="background:var(--warning); width:100%"></div></div>
            <div class="bar-val" id="val-mood">100</div>
        </div>
        <div style="text-align:center; margin-top:5px; font-size:0.8em; color:#666;">
            📅 第 <span id="ui-year">1</span> 年 - 第 <span id="ui-quarter">1</span> 季度
        </div>
    </div>

    <div id="game-area">
        <div id="log-box"></div>
    </div>

    <div id="controls">
        <div class="section-title">
            <span>☕ 摸鱼休闲</span>
            <span id="limit-leisure">0/4</span>
        </div>
        <div class="btn-group">
            <button class="leisure" onclick="game.actionLeisure('slack')">😴 摸鱼发呆</button>
            <button class="leisure" onclick="game.actionLeisure('read')">📚 看闲书</button>
            <button class="leisure" onclick="game.actionLeisure('gossip')">💬 聊八卦</button>
        </div>

        <div class="section-title">
            <span>💼 业务工作</span>
            <span id="limit-work">展览: 0/2</span>
        </div>
        <div class="btn-group">
            <button class="work" onclick="game.actionExhibition()">🎨 推进展览</button>
            <button class="research" id="btn-research" onclick="game.actionResearch()">🔬 申请课题</button>
            <button class="primary" onclick="game.nextQuarter()">🌙 结束本季度</button>
        </div>
    </div>
</div>

<div id="modal-start" class="modal">
    <div class="modal-content">
        <h2>🏛️ 博物馆生存指南</h2>
        <p>目标：在博物馆活下去，避免过劳死或抑郁，努力升职成为馆长。</p>
        <p style="font-size:0.9em; color:#666; text-align:left; margin:10px 0;">
            ⚠️ 警告：<br>
            1. 健康/愉悦归零直接结束。<br>
            2. 六年职位不升迁，将被辞退。<br>
            3. 健康低于20无法工作。
        </p>
        <button class="primary" style="width:100%; padding:15px;" onclick="game.init()">入职报到</button>
    </div>
</div>

<div id="modal-event" class="modal hidden">
    <div class="modal-content">
        <h3 id="event-title">事件标题</h3>
        <p id="event-desc">事件描述内容...</p>
        <div id="event-choices"></div>
    </div>
</div>

<script>
// ================= 配置与数据 =================
const CONFIG = {
    TITLES: [
        { name: "助理馆员", minYear: 0, require: { health:60, mood:50, ability:40, rep:10, quarters:4 } },
        { name: "馆员", minYear: 0, require: { health:50, mood:40, sci:60, admin:40, rep:50, quarters:24 } }, // 约6年? 原文是季度在岗，这里简化为总季度
        { name: "副研究员", minYear: 0, require: { health:40, mood:30, sci:80, admin:60, rep:150, quarters:32 } },
        { name: "研究员", minYear: 0, require: { health:30, mood:20, sci:90, admin:80, rep:300, quarters:48 } },
        { name: "馆长", minYear: 0, require: { health:1, mood:1, sci:100, admin:90, rep:500, quarters:60 } }
    ],
    EXHIBITION_STAGES: ["选题策划", "文物调研", "展品遴选", "展厅施工"]
};

const UTILS = {
    rand: (min, max) => Math.floor(Math.random() * (max - min + 1)) + min,
    randArr: (arr) => arr[Math.floor(Math.random() * arr.length)],
    clamp: (num, min, max) => Math.min(Math.max(num, min), max)
};

const game = {
    // 状态变量
    player: {},
    turn: { year: 1, quarter: 1, totalQuarters: 1 },
    limits: { leisure: 0, exhibition: 0 },
    flags: {
        researchApplying: false, // 是否正在申请课题
        exhibitionStage: 0,      // 当前展览进度 (0-3: 对应四个阶段, 4: 完成)
        exhibitionProgress: 0,   // 当前阶段百分比
        yearsSincePromo: 0       // 停滞年限
    },
    isOver: false,

    // === 初始化 ===
    init() {
        const educations = ["本科", "硕士", "博士"];
        const edu = UTILS.randArr(educations);
        let baseRep = 0;
        if(edu === "硕士") baseRep = 5;
        if(edu === "博士") baseRep = 10;

        this.player = {
            name: "玩家" + UTILS.rand(100,999),
            gender: UTILS.randArr(["男", "女"]),
            edu: edu,
            titleIdx: 0, // 0: 助理馆员
            health: 100,
            mood: 100,
            sci: UTILS.rand(0, 50),
            admin: UTILS.rand(0, 50),
            rep: baseRep,
            money: 10
        };

        this.turn = { year: 1, quarter: 1, totalQuarters: 1 };
        this.flags = { researchApplying: false, exhibitionStage: 0, exhibitionProgress: 0, yearsSincePromo: 0 };
        this.limits = { leisure: 4, exhibition: 2 };
        this.isOver = false;

        document.getElementById('modal-start').classList.add('hidden');
        this.log("system", `🎉 入职手续办理完成！`);
        this.log("system", `档案：${this.player.name} | ${this.player.gender} | ${this.player.edu}`);
        this.log("turn", `📅 第 1 年 - 第 1 季度 开始`);
        this.updateUI();
    },

    // === 核心循环：下一季度 ===
    nextQuarter() {
        if(this.isOver) return;

        // 1. 结算上一季度科研
        if (this.turn.quarter === 4 && this.flags.researchApplying) {
            this.settleResearch();
        }

        // 2. 时间流逝
        this.turn.quarter++;
        this.turn.totalQuarters++;
        if (this.turn.quarter > 4) {
            this.turn.year++;
            this.turn.quarter = 1;
            this.yearCheck(); // 年终检查
        }

        // 3. 重置点数
        this.limits.leisure = 4;
        this.limits.exhibition = 2;

        // 4. 生存判定
        this.checkSurvival();
        if(this.isOver) return;

        // 5. 随机事件
        this.triggerRandomEvent();

        this.log("turn", `📅 第 ${this.turn.year} 年 - 第 ${this.turn.quarter} 季度 开始`);
        this.updateUI();
    },

    // === 行为：休闲 (1季度4次) ===
    actionLeisure(type) {
        if(this.isOver) return;
        if(this.limits.leisure <= 0) {
            this.log("danger", "本季度摸鱼额度已用完，快去工作！");
            return;
        }

        this.limits.leisure--;
        
        let event = {};
        switch(type) {
            case 'slack': // 摸鱼：回血回蓝，微减行政
                this.changeStat('health', UTILS.rand(2, 5));
                this.changeStat('mood', UTILS.rand(3, 8));
                this.log("success", "😴 躲在库房睡了一觉，精神百倍。");
                break;
            case 'read': // 看书：加科研，微减心情
                this.showEventModal("📚 图书馆时光", "你想看什么书？", [
                    {txt: "专业图录 (科研↑ 愉悦↓)", cb: () => { this.changeStat('sci', 3); this.changeStat('mood', -2); }},
                    {txt: "策展案例 (行政↑ 愉悦↓)", cb: () => { this.changeStat('admin', 3); this.changeStat('mood', -2); }},
                    {txt: "八卦周刊 (愉悦↑)", cb: () => { this.changeStat('mood', 5); }}
                ]);
                break;
            case 'gossip': // 八卦：加声望或愉悦
                const gossip = ["听说馆长想换车了", "隔壁部门又吵架了", "食堂明天有红烧肉"];
                this.log("system", `💬 八卦：${UTILS.randArr(gossip)}`);
                this.changeStat('mood', 5);
                this.changeStat('rep', 1);
                break;
        }
        this.updateUI();
    },

    // === 行为：展览 (1季度2次) ===
    actionExhibition() {
        if(this.isOver) return;
        if(this.checkHealthLock()) return;
        if(this.limits.exhibition <= 0) {
            this.log("danger", "本季度展览工作已饱和。");
            return;
        }

        // 已经被选过一次的项目本季度不可再选? 
        // 简化逻辑：每次点击消耗一次机会
        this.limits.exhibition--;

        // 消耗
        this.changeStat('health', -5);
        this.changeStat('mood', -5);

        // 进度推进
        const progressGain = UTILS.rand(-10, 40);
        this.flags.exhibitionProgress += progressGain;
        
        const stageName = CONFIG.EXHIBITION_STAGES[this.flags.exhibitionStage];

        if (progressGain > 0) {
            this.changeStat('admin', 2);
            this.log("system", `🔨 [${stageName}] 推进顺利，完成度 +${progressGain}%`);
        } else {
            this.changeStat('mood', -5);
            this.log("danger", `⛈️ [${stageName}] 遇到困难（甲方改需求/经费不足），进度倒退。`);
        }

        // 阶段完成判定
        if (this.flags.exhibitionProgress >= 100) {
            this.log("success", `✅ [${stageName}] 阶段完成！`);
            this.flags.exhibitionProgress = 0;
            this.flags.exhibitionStage++;

            // 整个展览完成
            if (this.flags.exhibitionStage >= 4) {
                const repGain = UTILS.rand(1, 5) * 5; // 展览完成是大事件，声望多给点
                this.log("success", `🏆 展览圆满开幕！获得声望 +${repGain}`);
                this.changeStat('rep', repGain);
                this.changeStat('admin', 10);
                this.flags.exhibitionStage = 0; // 重置做下一个
            }
        }
        this.updateUI();
    },

    // === 行为：科研 (仅Q2申请) ===
    actionResearch() {
        if(this.isOver) return;
        if(this.checkHealthLock()) return;

        if (this.turn.quarter !== 2) {
            this.log("danger", "❌ 只有每年的第 2 季度可以申报课题。");
            return;
        }
        if (this.flags.researchApplying) {
            this.log("warning", "⏳ 今年的课题已经申报过了，等待结果中。");
            return;
        }

        this.changeStat('health', -10);
        this.changeStat('mood', -10);
        this.flags.researchApplying = true;
        this.log("system", "📝 提交了国家社科基金申报书，头秃。");
        this.updateUI();
    },

    settleResearch() {
        // 科研能力越高，成功率越高
        const successRate = 0.3 + (this.player.sci / 200); 
        const isSuccess = Math.random() < successRate;

        if (isSuccess) {
            this.log("success", "🎉 喜报！你的课题申报成功！经费+30万，声望+10");
            this.changeStat('money', 30);
            this.changeStat('rep', 10);
        } else {
            this.log("danger", "❌ 遗憾。课题申报未通过。");
            this.changeStat('mood', -10);
        }
        this.flags.researchApplying = false;
    },

    // === 年终检查与升职 ===
    yearCheck() {
        this.flags.yearsSincePromo++;
        const currentTitle = CONFIG.TITLES[this.player.titleIdx];
        
        // 尝试晋升
        const nextTitle = CONFIG.TITLES[this.player.titleIdx + 1];
        if (nextTitle) {
            // 检查条件
            // 注意：prompt里的条件是“或”还是“且”？prompt: "助理->馆员: 科研OR行政>=40"。
            // 但后面高级职位未明说，通常是且。这里简化：助理升馆员用OR，其他用AND。
            
            const p = this.player;
            const r = nextTitle.require;
            
            let abilityPass = false;
            if (this.player.titleIdx === 0) { // 助理升馆员
                abilityPass = (p.sci >= r.ability || p.admin >= r.ability); // r.ability for level 1
            } else {
                abilityPass = (p.sci >= r.sci && p.admin >= r.admin);
            }

            if (p.health >= r.health && p.mood >= r.mood && p.rep >= r.rep && abilityPass) {
                this.promote();
                return; // 升职了就重置了停滞年限，不会失败
            }
        }

        // 检查停滞失败
        if (this.flags.yearsSincePromo >= 6) {
            this.endGame("🚫 碌碌无为", "在一个岗位上停滞了6年，由于『非升即走』政策，你被辞退了。");
        }
    },

    promote() {
        this.player.titleIdx++;
        this.flags.yearsSincePromo = 0;
        const newTitle = CONFIG.TITLES[this.player.titleIdx].name;
        this.log("success", `🌟 恭喜！你晋升为了【${newTitle}】！`);
        this.showEventModal("🌟 升职喜报", `经过考评，你已晋升为${newTitle}！继续加油！`, [{txt:"太好了", cb:()=>{}}]);
        
        if (newTitle === "馆长") {
            this.endGame("👑 荣登馆长", "你成为了博物馆馆长，走上了人生巅峰！");
        }
    },

    // === 辅助逻辑 ===
    changeStat(key, val) {
        this.player[key] += val;
        // 限制范围
        if (key === 'health' || key === 'mood') this.player[key] = UTILS.clamp(this.player[key], 0, 100);
        if (key === 'sci' || key === 'admin') this.player[key] = UTILS.clamp(this.player[key], 0, 100);
        if (key === 'money') this.player[key] = Math.max(0, this.player[key]); // 钱不能负
    },

    checkHealthLock() {
        if (this.player.health <= 20) {
            this.log("danger", "🚑 身体极度虚弱，必须先休息（使用摸鱼功能）！");
            return true;
        }
        return false;
    },

    checkSurvival() {
        if (this.player.health <= 0) this.endGame("💀 过劳死", "你倒在了展厅里，享年...");
        else if (this.player.mood <= 0) this.endGame("🌧️ 抑郁而终", "精神压力过大，你彻底崩溃了。");
    },

    triggerRandomEvent() {
        // 简单模拟随机事件
        if(Math.random() > 0.3) return; 

        const events = [
            { t: "领导视察", d: "上级领导突击检查。", opts: [
                { txt: "陪同讲解 (行政+5, 愉悦-5)", cb:()=>{ this.changeStat('admin',5); this.changeStat('mood',-5); } },
                { txt: "躲进厕所 (无事发生)", cb:()=>{} }
            ]},
            { t: "文物捐赠", d: "有市民想捐赠家传宝贝。", opts: [
                { txt: "热情接待 (声望+5)", cb:()=>{ this.changeStat('rep',5); } },
                { txt: "按规章鉴定 (科研+5)", cb:()=>{ this.changeStat('sci',5); } }
            ]}
        ];
        const e = UTILS.randArr(events);
        this.showEventModal(e.t, e.d, e.opts);
    },

    // === UI 更新与弹窗 ===
    updateUI() {
        // Text
        document.getElementById('ui-name').innerText = this.player.name;
        document.getElementById('ui-education').innerText = this.player.edu;
        document.getElementById('ui-title').innerText = CONFIG.TITLES[this.player.titleIdx].name;
        
        document.getElementById('ui-sci').innerText = this.player.sci;
        document.getElementById('ui-admin').innerText = this.player.admin;
        document.getElementById('ui-rep').innerText = this.player.rep;
        document.getElementById('ui-money').innerText = this.player.money;

        document.getElementById('ui-year').innerText = this.turn.year;
        document.getElementById('ui-quarter').innerText = this.turn.quarter;

        // Bars
        const setBar = (id, val, txtId) => {
            const el = document.getElementById(id);
            el.style.width = val + "%";
            el.style.backgroundColor = val < 20 ? "var(--danger)" : (id.includes('health')?"var(--danger)":"var(--warning)");
            document.getElementById(txtId).innerText = val;
        };
        setBar('bar-health', this.player.health, 'val-health');
        setBar('bar-mood', this.player.mood, 'val-mood');

        // Limits
        document.getElementById('limit-leisure').innerText = `${this.limits.leisure}/4`;
        document.getElementById('limit-work').innerText = `展览: ${this.limits.exhibition}/2`;

        // Button States
        const btnResearch = document.getElementById('btn-research');
        if(this.turn.quarter !== 2 || this.flags.researchApplying) {
            btnResearch.disabled = true;
            btnResearch.style.opacity = "0.5";
        } else {
            btnResearch.disabled = false;
            btnResearch.style.opacity = "1";
        }
    },

    log(type, msg) {
        const box = document.getElementById('log-box');
        const div = document.createElement('div');
        div.className = `log-line log-${type}`;
        div.innerText = msg;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    },

    showEventModal(title, desc, choices) {
        const m = document.getElementById('modal-event');
        document.getElementById('event-title').innerText = title;
        document.getElementById('event-desc').innerText = desc;
        const cBox = document.getElementById('event-choices');
        cBox.innerHTML = "";
        
        choices.forEach(c => {
            const btn = document.createElement('button');
            btn.className = "choice-btn";
            btn.innerText = c.txt;
            btn.onclick = () => {
                c.cb();
                m.classList.add('hidden');
                this.updateUI(); // 刷新数值
                this.checkSurvival(); // 事件后也要检查死活
            };
            cBox.appendChild(btn);
        });
        m.classList.remove('hidden');
    },

    endGame(title, reason) {
        this.isOver = true;
        this.showEventModal(title, reason, [{
            txt: "🔄 重新开始",
            cb: () => location.reload()
        }]);
    }
};

</script>
</body>
</html>
