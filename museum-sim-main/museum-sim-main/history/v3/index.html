<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博物馆生存指南 V5.0 (职场风云版)</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --panel-bg: #ffffff;
            --primary: #2c3e50;
            --accent: #5DADE2;
            --danger: #E74C3C;
            --success: #27AE60;
            --warning: #F39C12;
            --text-main: #333;
            --text-sub: #666;
            --border-radius: 8px;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 98vw;
            height: 95vh;
            max-width: 1600px;
            display: grid;
            grid-template-columns: 280px 1fr 320px; /* 左-中-右 布局 */
            grid-template-rows: 1fr;
            gap: 15px;
        }

        .panel {
            background: var(--panel-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            height: 100%;
            box-sizing: border-box;
        }

        /* === 左栏：档案 + 状态 + 摸鱼 === */
        #col-left { border-right: 1px solid #e0e0e0; }

        .profile-card { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .avatar { font-size: 3em; margin-bottom: 5px; }
        .user-name { font-size: 1.2em; font-weight: bold; }
        .user-title { background: var(--primary); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; margin-top: 5px; display: inline-block;}

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-item { background: #f9f9f9; padding: 8px; border-radius: 6px; text-align: center; }
        .stat-num { display: block; font-weight: bold; color: var(--primary); font-size: 1.1em; }
        .stat-label { font-size: 0.8em; color: #888; }

        .bars-area { margin-bottom: 20px; }
        .bar-row { margin-bottom: 8px; }
        .bar-header { display: flex; justify-content: space-between; font-size: 0.85em; margin-bottom: 2px; }
        .bar-track { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.3s; }

        /* 摸鱼区置底 */
        .leisure-section { margin-top: auto; border-top: 2px solid #eee; padding-top: 15px; }
        .section-header { font-weight: bold; font-size: 0.95em; color: var(--text-sub); margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        button { border: none; border-radius: 6px; padding: 10px; cursor: pointer; font-size: 0.9em; transition: all 0.2s; }
        
        .btn-leisure { background: white; border: 1px solid #ddd; color: #444; display: flex; justify-content: space-between; align-items: center; }
        .btn-leisure:hover:not(:disabled) { background: #f0f8ff; border-color: var(--accent); color: var(--accent); }
        .btn-leisure:disabled { opacity: 0.6; cursor: not-allowed; }

        /* === 中栏：业务导航 === */
        #col-middle { background: #fdfdfd; }
        
        .nav-block { margin-bottom: 20px; background: white; border: 1px solid #eee; border-radius: 8px; padding: 15px; }
        .nav-title { font-weight: bold; margin-bottom: 10px; color: var(--primary); display: flex; justify-content: space-between; align-items: center; }
        
        /* 科研 */
        .research-box { display: flex; justify-content: space-between; align-items: center; background: #fffbe6; padding: 10px; border-radius: 6px; border: 1px solid #ffe58f; }
        
        /* 展览列表 */
        .exhibit-list { display: flex; flex-direction: column; gap: 10px; }
        .exhibit-card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; background: white; position: relative; }
        .exhibit-card.active { border-left: 4px solid var(--accent); }
        .exhibit-card.waiting { border-left: 4px solid #ccc; background: #f9f9f9; }
        
        .ex-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; font-size: 1em; }
        .task-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .task-btn { 
            font-size: 0.8em; padding: 6px; border: 1px solid #eee; background: #fff; border-radius: 4px; 
            cursor: pointer; text-align: center; transition: all 0.2s;
        }
        .task-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: #f4faff; }
        .task-btn.done { background: #eaffea; border-color: #bef5cb; color: #27ae60; cursor: default; }
        
        .btn-primary { background: var(--primary); color: white; font-weight: bold; width: 100%; padding: 12px; }
        .btn-primary:hover:not(:disabled) { background: #34495e; }
        .btn-primary:disabled { background: #bdc3c7; cursor: not-allowed; }

        /* === 右栏：日志 === */
        #col-right { border-left: 1px solid #e0e0e0; }
        
        .log-header { font-weight: bold; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 2px solid #eee; display: flex; justify-content: space-between;}
        #log-container { flex: 1; overflow-y: auto; font-size: 0.9em; line-height: 1.5; padding-right: 5px; }
        .log-entry { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px dashed #eee; }
        .log-turn { text-align: center; background: #eef2f6; padding: 5px; border-radius: 4px; color: var(--primary); font-weight: bold; margin: 10px 0; }
        .log-sys { color: #666; font-style: italic; }
        .log-danger { color: var(--danger); }
        .log-success { color: var(--success); }
        .log-event { border-left: 3px solid var(--accent); padding-left: 8px; background: #fafafa; }

        /* === 弹窗 === */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .hidden { display: none; }
        .modal-box { background: white; width: 500px; max-width: 90%; padding: 25px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-height: 85vh; overflow-y: auto; }
        .modal-title { font-size: 1.2em; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px; color: var(--primary); }
        .modal-text { white-space: pre-wrap; margin-bottom: 20px; line-height: 1.6; color: #444; }
        .choice-list { display: grid; gap: 10px; }
        .choice-btn { background: #f8f9fa; border: 1px solid #ddd; padding: 12px; text-align: left; border-radius: 6px; width: 100%; transition: 0.2s; }
        .choice-btn:hover { background: #eef2f6; border-color: #bbb; }

    </style>
</head>
<body>

<div id="app">
    <div class="panel" id="col-left">
        <div class="profile-card">
            <div class="avatar">🏛️</div>
            <div class="user-name" id="ui-name">加载中...</div>
            <div class="user-title" id="ui-title">助理馆员</div>
            <div style="font-size:0.85em; color:#888; margin-top:5px;" id="ui-edu">学历</div>
        </div>

        <div class="stats-grid">
            <div class="stat-item"><span class="stat-num" id="ui-iq">0</span><span class="stat-label">智商</span></div>
            <div class="stat-item"><span class="stat-num" id="ui-eq">0</span><span class="stat-label">情商</span></div>
            <div class="stat-item"><span class="stat-num" id="ui-rep">0</span><span class="stat-label">声望</span></div>
            <div class="stat-item"><span class="stat-num" id="ui-risk">0</span><span class="stat-label">风险值</span></div>
        </div>
        
        <div style="text-align:center; margin-bottom:15px; font-weight:bold; color:#2c3e50; font-size:1.1em;">
            💰 <span id="ui-money">0</span>
        </div>

        <div class="bars-area">
            <div class="bar-row">
                <div class="bar-header"><span>❤️ 健康</span><span id="txt-health">100</span></div>
                <div class="bar-track"><div class="bar-fill" id="bar-health" style="width:100%; background:var(--danger)"></div></div>
            </div>
            <div class="bar-row">
                <div class="bar-header"><span>😃 愉悦</span><span id="txt-mood">100</span></div>
                <div class="bar-track"><div class="bar-fill" id="bar-mood" style="width:100%; background:var(--warning)"></div></div>
            </div>
        </div>

        <div class="leisure-section">
            <div class="section-header">
                <span>☕ 摸鱼休息</span>
                <span id="limit-leisure">4/4</span>
            </div>
            <div class="btn-grid">
                <button class="btn-leisure" onclick="game.actionLeisure('slack')">
                    <span>😴 闭目养神</span><span>+健康 +愉悦</span>
                </button>
                <button class="btn-leisure" onclick="game.actionLeisure('read')">
                    <span>📚 阅读书籍</span><span>随机增益</span>
                </button>
                <button class="btn-leisure" onclick="game.actionLeisure('gossip')">
                    <span>💬 聊八卦</span><span>±声望 ±情商</span>
                </button>
            </div>
        </div>
    </div>

    <div class="panel" id="col-middle">
        <div class="nav-block">
            <div class="nav-title">
                <span>🔬 科研项目</span>
                <span style="font-size:0.8em; font-weight:normal" id="research-count">0/5</span>
            </div>
            <div class="research-box">
                <div id="research-msg" style="font-size:0.9em; color:#666;">窗口期未开启</div>
                <button class="btn-primary" id="btn-research" style="width:auto; padding:8px 15px; font-size:0.9em;" onclick="game.actionResearch()" disabled>申报课题</button>
            </div>
        </div>

        <div class="nav-block" style="flex:1; display:flex; flex-direction:column;">
            <div class="nav-title">
                <span>🏛️ 展览策划</span>
                <span style="font-size:0.8em; font-weight:normal" id="limit-exhibit">4/4</span>
            </div>
            
            <button class="btn-primary" id="btn-new-exhibit" style="margin-bottom:15px;" onclick="game.actionApplyExhibit()">+ 申请新展览 (Q限1)</button>
            
            <div id="exhibits-container" class="exhibit-list">
                </div>
        </div>
    </div>

    <div class="panel" id="col-right">
        <div class="log-header">
            <span>📅 游戏日志</span>
            <span style="font-size:0.9em; background:#eee; padding:2px 8px; border-radius:4px;">
                第 <span id="ui-year">1</span> 年 - Q<span id="ui-quarter">1</span>
            </span>
        </div>
        <div id="log-container"></div>
        <div style="margin-top:auto; padding-top:15px; border-top:1px solid #eee;">
            <button class="btn-primary" onclick="game.nextQuarter()" style="height:50px; font-size:1.1em;">🌙 结束本季度</button>
        </div>
    </div>
</div>

<div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-box">
        <div class="modal-title" id="modal-title">标题</div>
        <div class="modal-text" id="modal-text">内容</div>
        <div class="choice-list" id="modal-choices"></div>
    </div>
</div>

<script>
// ==================== 数据配置库 ====================

// 姓名库
const NAME_DB = [
    "张吉惟", "林国瑞", "林玟书", "林雅南", "江奕云", "刘柏宏", "阮建安", "林子帆", "夏志豪", "吉茹定", 
    "李中冰", "黄文隆", "谢彦文", "傅智翔", "洪振霞", "刘姿婷", "荣姿康", "吕致盈", "方一强", "黎芸贵", 
    "郑伊雯", "雷进宝", "吴美隆", "吴心真", "王美珠", "郭芳天", "李雅惠", "陈文婷", "曹敏侑", "王依婷"
];

// 职位晋升表
const TITLES = [
    { name: "助理馆员", require: { health:60, mood:50, ability:40, rep:10, quarters:4 } },
    { name: "馆员", require: { health:50, mood:40, iq:60, eq:40, rep:50, quarters:24 } },
    { name: "副研究员", require: { health:40, mood:30, iq:80, eq:60, rep:150, quarters:32 } },
    { name: "研究员", require: { health:30, mood:20, iq:90, eq:80, rep:300, quarters:48 } },
    { name: "馆长", require: { health:1, mood:1, iq:100, eq:90, rep:500, quarters:60 } }
];

// 展览任务 (cost单位：元)
const EX_TASKS = {
    'collect': { name: "资料收集", cost: 1000 },
    'read':    { name: "阅读整理", cost: 500 },
    'trip':    { name: "出差调研", cost: 8000 },
    'theme':   { name: "主题选定", cost: 1000 },
    'items':   { name: "展品选择", cost: 2000 },
    'design':  { name: "形式设计", cost: 15000 },
    'souvenir':{ name: "文创设计", cost: 5000 }
};

const EX_THEMES = [
    "汉代陶俑特展", "近代陈虾条书画展", "西提地区历史文物展", 
    "古埃及神秘木乃伊展", "江南生活美学展", "馆藏青铜器精品展", 
    "非遗传承手工技艺展", "史前恐龙化石展"
];

// 阅读事件库
const READING_EVENTS = [
    { txt: "你阅读了专业书《木乃伊的制作与保存技术》，系统理解了防腐流程与材料逻辑。", effect: { iq: 2 } },
    { txt: "你研读了《博物馆展陈叙事学导论》，对展览结构和观众路径有了更清晰的判断。", effect: { iq: 3, rep: 1 } },
    { txt: "你翻完了《青铜器纹饰与权力象征》，开始能从器物细节推断复杂的社会关系。", effect: { iq: 2 } },
    { txt: "你认真阅读了《田野笔记的方法与伦理》，在处理资料时变得更加克制。", effect: { iq: 1 } },
    { txt: "你读完了言情小说《何以笙箫默》，对人际关系中的情绪变化更加敏感。", effect: { mood: 2, eq: 2 } },
    { txt: "你阅读了小说《小城之春》，对含蓄表达与未说出口的情感有了新的理解。", effect: { eq: 3, mood: 1 } },
    { txt: "你沉浸在小说《请回答一九九七》中，对集体记忆与个人成长产生共鸣。", effect: { eq: 2, mood: 2, rep: 1 } },
    { txt: "你翻阅了随笔集《人间草木》，阅读过程让你逐渐放松下来。", effect: { health: 3, mood: 2 } },
    { txt: "你阅读了推理小说《嫌疑人Ｘ的献身》，严密的推演过程训练了你的思考方式。", effect: { iq: 1, eq: 1 } },
    { txt: "你读完了科普书《万物简史》，宏观视角让你重新理解个人工作的意义。", effect: { iq: 2, mood: 1 } }
];

// 八卦事件库
const GOSSIP_EVENTS = [
    { txt: "你在茶水间听同事聊起最近的展览调整内幕，并适时补充了一点专业背景。", effect: { rep: 2, eq: 1 } },
    { txt: "你在下班路上和同事交流馆内人事变动时保持了克制与分寸。", effect: { eq: 3 } },
    { txt: "你在工作群私聊中委婉提醒同事注意措辞，避免了一场误会。", effect: { eq: 2, rep: 1 } },
    { txt: "你在展厅布展间隙听前辈讲述旧展览的往事，并认真倾听没有插话。", effect: { eq: 1, rep: 2 } },
    { txt: "你在午餐时参与讨论其他博物馆的策展风格，观点温和且不站队。", effect: { eq: 2, rep: 1 } },
    { txt: "你无意中转述了尚未公开的借展消息，很快发现气氛变得微妙。", effect: { rep: -3, eq: -1 } },
    { txt: "你在私下评价某位策展人的方案，被当事人间接听到。", effect: { rep: -2, eq: -2 } },
    { txt: "你在闲聊中对馆内行政安排表达不满，引发同事尴尬沉默。", effect: { eq: -3 } },
    { txt: "你在讨论文创收益分配时语气过于直接，被认为不够圆滑。", effect: { eq: -2, rep: -1 } },
    { txt: "你误判了同事之间的关系，站错了立场。", effect: { rep: -1 } }
];

// 策展专属剧情 (部分示例)
const CURATION_FLAVOR = {
    'collect': "你在资料堆中发现了一份关键的未公开记录。",
    'trip': "实地调研的发现推翻了你之前的假设。",
    'design': "设计方案几经修改，终于平衡了审美与保护。",
    'default': "你推进了这项工作，进度稳步提升。"
};

// ==================== 核心逻辑 ====================

const UTILS = {
    rand: (min, max) => Math.floor(Math.random() * (max - min + 1)) + min,
    randArr: (arr) => arr[Math.floor(Math.random() * arr.length)],
    clamp: (num, min, max) => Math.min(Math.max(num, min), max),
    formatMoney: (val) => val >= 10000 ? (val/10000).toFixed(2) + "万" : Math.floor(val) + "元"
};

const game = {
    player: {},
    turn: { year: 1, quarter: 1 },
    limits: { leisure: 4, exhibit: 4 },
    exhibitions: [],
    flags: {
        yearsSincePromo: 0,
        researchApplied: false,
        researchSuccessCount: 0,
        hasAppliedExhibitThisQuarter: false,
        sideJobCount: 0 // 私活计数
    },
    isOver: false,

    init() {
        const edu = UTILS.randArr(["本科", "硕士", "博士"]);
        let baseRep = edu === "硕士" ? 5 : (edu === "博士" ? 10 : 0);

        this.player = {
            name: UTILS.randArr(NAME_DB),
            edu: edu,
            titleIdx: 0,
            health: 100, mood: 100,
            iq: UTILS.rand(10, 50),
            eq: UTILS.rand(10, 50),
            rep: baseRep,
            money: 10000 // 初始1万元
        };

        this.turn = { year: 1, quarter: 1 };
        this.flags = { yearsSincePromo: 0, researchApplied: false, researchSuccessCount: 0, hasAppliedExhibitThisQuarter: false, sideJobCount: 0 };
        this.exhibitions = [];
        this.limits = { leisure: 4, exhibit: 4 };
        this.isOver = false;

        document.getElementById('modal-overlay').classList.add('hidden');
        this.log("system", `🎉 欢迎入职，${this.player.name}！学历：${this.player.edu}`);
        this.updateUI();
        this.renderExhibitPanel();
    },

    // === 季度流转 ===
    nextQuarter() {
        if(this.isOver) return;

        // 1. 发薪日判定 (Q3)
        if (this.turn.quarter === 3) {
            const tax = 15000 * 0.2; // 20%税
            const net = 15000 - tax;
            this.changeStat('money', net);
            this.log("success", `💰 发薪日！工资15000元，扣税${tax}元，实发${net}元。`);
        } else {
            // 非发薪日触发外快事件 (Q1, Q2, Q4)
            this.triggerSideJob();
        }

        // 2. 坐牢风险判定
        if (this.flags.sideJobCount >= 5) {
            if (Math.random() < 0.3) {
                this.endGame("🚓 锒铛入狱", "你因为频繁违规接私活被举报调查，职业生涯彻底结束。");
                return;
            }
        }

        // 3. 科研结算 (Q4)
        if (this.turn.quarter === 4 && this.flags.researchApplied) this.settleResearch();

        // 4. 展览反馈计时
        this.exhibitions.forEach(ex => {
            if (ex.status === 'waiting') {
                ex.feedbackTimer--;
                if (ex.feedbackTimer <= 0) {
                    ex.status = 'ready_for_feedback';
                    this.log("success", `📬 《${ex.name}》的观众反馈报告已生成！`);
                }
            }
        });

        // 5. 时间推进
        this.turn.quarter++;
        if (this.turn.quarter > 4) {
            this.turn.year++;
            this.turn.quarter = 1;
            this.yearCheck();
            this.flags.researchApplied = false;
        }

        // 6. 重置点数
        this.limits.leisure = 4;
        this.limits.exhibit = 4;
        this.flags.hasAppliedExhibitThisQuarter = false;

        this.checkSurvival();
        if(this.isOver) return;

        this.log("turn", `📅 第 ${this.turn.year} 年 - Q${this.turn.quarter}`);
        this.updateUI();
        this.renderExhibitPanel();
    },

    // === 经济：外快系统 ===
    triggerSideJob() {
        // 50%概率触发
        if (Math.random() > 0.5) return;

        const isCorp = Math.random() > 0.5; // 50%是企业合作，50%是私活
        
        if (isCorp) {
            // 企业合作：金额浮动，扣税，无风险
            let gross = UTILS.rand(3000, 5000) + Math.random() * 99; // 浮动小数
            let tax = gross * 0.2;
            let net = gross - tax;
            
            this.showModal("💼 企业合作机会", `某文化公司邀请你作为顾问参与项目。\n\n报酬：${gross.toFixed(2)}元\n扣税：${tax.toFixed(2)}元\n实得：${net.toFixed(2)}元\n\n(合法合规，无风险)`, [
                { txt: "接受合作 (+金钱)", cb: () => {
                    this.changeStat('money', net);
                    this.log("success", `💰 完成企业合作，入账 ${UTILS.formatMoney(net)}。`);
                    this.closeModal();
                }},
                { txt: "婉言谢绝", cb: () => this.closeModal() }
            ]);
        } else {
            // 私活：整数，不扣税，增加风险
            let pay = UTILS.rand(2000, 10000);
            
            this.showModal("🤫 私活邀约", `有人私下找你鉴定一批藏品，希望不要走官方流程。\n\n报酬：${pay}元 (现金)\n\n⚠️ 警告：接受私活累计超过5次，将面临极高的法律风险！\n当前累计次数：${this.flags.sideJobCount}`, [
                { txt: "铤而走险 (+金钱 +风险)", cb: () => {
                    this.changeStat('money', pay);
                    this.flags.sideJobCount++;
                    this.changeStat('rep', -2); // 做私活稍微掉点声望
                    this.log("danger", `💰 偷偷收下了 ${pay}元，心里有些不安。(累计风险: ${this.flags.sideJobCount})`);
                    this.closeModal();
                }},
                { txt: "严词拒绝", cb: () => this.closeModal() }
            ]);
        }
    },

    // === 摸鱼系统 (加强版) ===
    actionLeisure(type) {
        if(this.limits.leisure <= 0) { this.log("danger", "没时间摸鱼了！"); return; }
        this.limits.leisure--;

        if (type === 'slack') {
            this.changeStat('health', 5);
            this.changeStat('mood', 5);
            this.log("success", "😴 你在库房角落小憩了一会儿，精神好多了。");
        } 
        else if (type === 'read') {
            const book = UTILS.randArr(READING_EVENTS);
            let changes = [];
            for (let k in book.effect) {
                this.changeStat(k, book.effect[k]);
                changes.push(`${this.getStatName(k)}+${book.effect[k]}`);
            }
            this.log("system", `📚 ${book.txt} (${changes.join(', ')})`);
        }
        else if (type === 'gossip') {
            const gossip = UTILS.randArr(GOSSIP_EVENTS);
            let changes = [];
            for (let k in gossip.effect) {
                this.changeStat(k, gossip.effect[k]);
                let sign = gossip.effect[k] > 0 ? '+' : '';
                changes.push(`${this.getStatName(k)}${sign}${gossip.effect[k]}`);
            }
            // 根据结果颜色
            let logType = changes.some(s => s.includes('-')) ? "danger" : "success";
            this.log(logType, `💬 ${gossip.txt} (${changes.join(', ')})`);
        }
        this.updateUI();
    },

    // === 展览系统 ===
    actionApplyExhibit() {
        if (this.flags.hasAppliedExhibitThisQuarter) {
            this.showModal("提示", "本季度已申请过，请下季度再来。", [{txt:"好的",cb:()=>this.closeModal()}]);
            return;
        }
        
        // 过滤掉已经在做的展览
        const currentNames = this.exhibitions.map(e => e.name);
        const availableThemes = EX_THEMES.filter(t => !currentNames.includes(t));
        
        const activeCount = this.exhibitions.filter(e => e.status !== 'finished').length;
        if (activeCount >= 2) {
            this.showModal("任务过载", "手头已有两个项目，请先完成手头工作！", [{txt:"这就去干活",cb:()=>this.closeModal()}]);
            return;
        }

        // 随机取3个不重复的
        const options = [];
        for(let i=0; i<3; i++) {
            if(availableThemes.length === 0) break;
            const idx = Math.floor(Math.random() * availableThemes.length);
            options.push(availableThemes[idx]);
            availableThemes.splice(idx, 1);
        }

        const btnOpts = options.map(theme => ({
            txt: `申请《${theme}》`,
            cb: () => {
                this.startExhibition(theme);
                this.flags.hasAppliedExhibitThisQuarter = true;
                this.closeModal();
            }
        }));

        this.showModal("展览立项申请", "请选择要负责的展览项目：", btnOpts);
    },

    startExhibition(name) {
        this.exhibitions.push({
            id: Date.now(),
            name: name,
            status: "active",
            tasks: { collect: 0, read: 0, trip: 0, theme: 0, items: 0, design: 0, souvenir: 0 },
            feedbackTimer: 0
        });
        this.log("success", `📝 《${name}》立项成功！`);
        this.renderExhibitPanel();
        this.updateUI();
    },

    actionExhibitTask(exhibitId, taskKey) {
        if(this.limits.exhibit <= 0) { this.log("danger", "展览事务精力耗尽。"); return; }
        if(this.checkHealthLock()) return;

        const ex = this.exhibitions.find(e => e.id === exhibitId);
        if (!ex) return;

        const task = EX_TASKS[taskKey];
        if (this.player.money < task.cost) {
            this.showModal("经费不足", `需要 ${UTILS.formatMoney(task.cost)}，当前经费不足。`, [{txt:"好的",cb:()=>this.closeModal()}]);
            return;
        }

        const flavor = CURATION_FLAVOR[taskKey] || CURATION_FLAVOR['default'];
        const progress = UTILS.rand(50, 100);

        this.showModal(`推进：${task.name}`, `${flavor}\n\n[消耗 ${UTILS.formatMoney(task.cost)} | 进度 +${progress}%]`, [{
            txt: "确认执行",
            cb: () => {
                this.limits.exhibit--;
                this.changeStat('money', -task.cost);
                this.changeStat('health', -5);
                
                ex.tasks[taskKey] = Math.min(100, ex.tasks[taskKey] + progress);
                this.log("system", `🔨 [${ex.name}] ${task.name}进度 +${progress}%`);

                if (Object.values(ex.tasks).every(v => v >= 100)) {
                    ex.status = "waiting";
                    ex.feedbackTimer = 1;
                    this.log("success", `🎉 《${ex.name}》筹备完成！`);
                }
                
                this.closeModal();
                this.updateUI();
                this.renderExhibitPanel();
            }
        }]);
    },

    renderExhibitPanel() {
        const container = document.getElementById('exhibits-container');
        const limitSpan = document.getElementById('limit-exhibit');
        const btnApply = document.getElementById('btn-new-exhibit');
        
        if (!container) return;
        limitSpan.innerText = `${this.limits.exhibit}/4`;

        // 按钮状态
        const activeCount = this.exhibitions.filter(e => e.status !== 'finished').length;
        if (this.flags.hasAppliedExhibitThisQuarter || activeCount >= 2) {
            btnApply.disabled = true;
            btnApply.innerText = activeCount >= 2 ? "项目已满 (上限2个)" : "本季度已申请";
        } else {
            btnApply.disabled = false;
            btnApply.innerText = "+ 申请新展览 (Q限1)";
        }

        container.innerHTML = "";
        if (this.exhibitions.length === 0) {
            container.innerHTML = `<div style="text-align:center; color:#ccc; padding:20px; border:2px dashed #eee;">暂无进行中的项目</div>`;
            return;
        }

        this.exhibitions.forEach(ex => {
            const div = document.createElement('div');
            
            if (ex.status === 'active') {
                div.className = "exhibit-card active";
                let html = `<div class="ex-header"><span>📝 ${ex.name}</span></div><div class="task-grid">`;
                for (let key in EX_TASKS) {
                    const info = EX_TASKS[key];
                    const progress = ex.tasks[key];
                    const isDone = progress >= 100;
                    let btnClass = "task-btn" + (isDone ? " done" : "");
                    let onclick = isDone ? "" : `onclick="game.actionExhibitTask(${ex.id}, '${key}')"`;
                    let disabled = isDone ? "disabled" : "";
                    html += `<button class="${btnClass}" ${onclick} ${disabled}>${info.name}<br>${isDone?'✔':progress+'%'}</button>`;
                }
                html += `</div>`;
                div.innerHTML = html;
            } else if (ex.status === 'waiting') {
                div.className = "exhibit-card waiting";
                div.innerHTML = `<div class="ex-header">⏳ ${ex.name}</div><div style="text-align:center; color:#888;">正在收集反馈...</div>`;
            } else if (ex.status === 'ready_for_feedback') {
                div.className = "exhibit-card";
                div.innerHTML = `<div class="ex-header">📬 ${ex.name}</div><button class="btn-primary" onclick="game.actionViewFeedback(${ex.id})">查看反馈报告</button>`;
            }
            container.appendChild(div);
        });
    },

    // === 科研与通用 ===
    actionResearch() {
        if (this.turn.quarter !== 1) return;
        this.changeStat('health', -10);
        this.changeStat('mood', -5);
        this.flags.researchApplied = true;
        this.log("system", "📝 申报了年度课题，结果将在Q4公布。");
        this.updateUI();
    },

    settleResearch() {
        let rate = 0.3 + (this.player.iq / 200);
        if (Math.random() < rate && this.flags.researchSuccessCount < 5) {
            this.flags.researchSuccessCount++;
            this.changeStat('money', 200000); // 20万
            this.changeStat('rep', 10);
            this.showModal("科研喜报", "🎉 恭喜！你的课题获批立项！\n\n获得经费：200,000元\n获得声望：10", [{txt:"太棒了", cb:()=>this.closeModal()}]);
            this.log("success", "🏆 科研申报成功！经费+20万");
        } else {
            this.log("danger", "❌ 本年度科研申报未通过。");
        }
    },

    actionViewFeedback(exhibitId) {
        const ex = this.exhibitions.find(e => e.id === exhibitId);
        if(!ex) return;
        // 简单反馈逻辑
        this.changeStat('rep', 10);
        this.changeStat('money', 5000);
        this.showModal(`反馈报告：《${ex.name}》`, "展览圆满结束，获得了一致好评！\n\n声望+10，奖金+5000元", [{txt:"归档", cb:()=>{
            this.exhibitions = this.exhibitions.filter(e => e.id !== exhibitId);
            this.closeModal();
            this.renderExhibitPanel();
        }}]);
    },

    // === 辅助 ===
    changeStat(key, val) {
        this.player[key] += val;
        if (['health','mood','iq','eq'].includes(key)) this.player[key] = UTILS.clamp(this.player[key], 0, 100);
        if (key === 'money') this.player[key] = Math.max(0, this.player[key]);
    },
    
    getStatName(key) {
        const map = { health:'健康', mood:'愉悦', iq:'智商', eq:'情商', rep:'声望', money:'金钱' };
        return map[key] || key;
    },

    checkSurvival() {
        if (this.player.health <= 0) this.endGame("💀 过劳死", "你倒在了工作岗位上……");
        else if (this.player.mood <= 0) this.endGame("🌧️ 抑郁离职", "精神压力过大，你选择了裸辞。");
    },
    
    checkHealthLock() {
        if (this.player.health <= 20) {
            this.showModal("警告", "🚑 身体状况极差，无法工作！请先休息。", [{txt:"好的",cb:()=>this.closeModal()}]);
            return true;
        }
        return false;
    },

    yearCheck() {
        this.flags.yearsSincePromo++;
        const nextTitle = TITLES[this.player.titleIdx + 1];
        if (nextTitle) {
            const p = this.player;
            const r = nextTitle.require;
            let pass = (p.iq >= r.iq && p.eq >= r.eq && p.health >= r.health && p.mood >= r.mood && p.rep >= r.rep);
            if (this.player.titleIdx === 0) pass = (p.iq >= r.ability || p.eq >= r.ability) && p.health>=r.health; // 助理特殊逻辑

            if (pass) {
                this.player.titleIdx++;
                this.flags.yearsSincePromo = 0;
                this.showModal("🌟 升职喜报", `恭喜！你已晋升为【${nextTitle.name}】！`, [{txt:"太棒了", cb:()=>this.closeModal()}]);
                if(nextTitle.name === "馆长") this.endGame("👑 荣登馆长", "你成为了博物馆馆长，游戏通关！");
                return;
            }
        }
        if (this.flags.yearsSincePromo >= 6) this.endGame("🚫 黯然离场", "六年未获晋升，合同终止。");
    },

    updateUI() {
        document.getElementById('ui-name').innerText = this.player.name;
        document.getElementById('ui-edu').innerText = this.player.edu;
        document.getElementById('ui-title').innerText = TITLES[this.player.titleIdx].name;
        document.getElementById('ui-iq').innerText = this.player.iq;
        document.getElementById('ui-eq').innerText = this.player.eq;
        document.getElementById('ui-rep').innerText = this.player.rep;
        document.getElementById('ui-money').innerText = UTILS.formatMoney(this.player.money);
        document.getElementById('ui-risk').innerText = this.flags.sideJobCount;
        document.getElementById('ui-risk').style.color = this.flags.sideJobCount >= 5 ? "red" : "inherit";

        document.getElementById('ui-year').innerText = this.turn.year;
        document.getElementById('ui-quarter').innerText = this.turn.quarter;
        
        document.getElementById('bar-health').style.width = this.player.health + "%";
        document.getElementById('txt-health').innerText = this.player.health;
        document.getElementById('bar-mood').style.width = this.player.mood + "%";
        document.getElementById('txt-mood').innerText = this.player.mood;
        
        document.getElementById('limit-leisure').innerText = `${this.limits.leisure}/4`;
        
        const resBtn = document.getElementById('btn-research');
        const resCount = document.getElementById('research-count');
        resCount.innerText = `${this.flags.researchSuccessCount}/5`;
        if (this.turn.quarter === 1 && !this.flags.researchApplied && this.flags.researchSuccessCount < 5) {
            resBtn.disabled = false;
            document.getElementById('research-msg').innerText = "申报窗口已开启";
            document.getElementById('research-msg').style.color = "green";
        } else {
            resBtn.disabled = true;
            document.getElementById('research-msg').innerText = this.flags.researchApplied ? "等待评审..." : "非申报期";
            document.getElementById('research-msg').style.color = "#999";
        }
    },

    log(type, msg) {
        const box = document.getElementById('log-container');
        const div = document.createElement('div');
        div.className = `log-entry log-${type}`;
        div.innerText = msg;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    },

    showModal(title, text, choices) {
        const overlay = document.getElementById('modal-overlay');
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-text').innerText = text;
        const list = document.getElementById('modal-choices');
        list.innerHTML = "";
        choices.forEach(c => {
            const btn = document.createElement('button');
            btn.className = "choice-btn";
            btn.innerText = c.txt;
            btn.onclick = c.cb;
            list.appendChild(btn);
        });
        overlay.classList.remove('hidden');
    },

    closeModal() {
        document.getElementById('modal-overlay').classList.add('hidden');
    },

    endGame(title, reason) {
        this.isOver = true;
        this.showModal(title, reason, [{ txt: "🔄 重新开始", cb: () => location.reload() }]);
    }
};

game.init();

</script>
</body>
</html>
