<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dice Roll (Three.js)</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; }
      #ui { position: fixed; left: 12px; top: 12px; z-index: 10; }
      button { font-size: 16px; padding: 8px 12px; }
      #result { margin-left: 10px; font-family: system-ui; }
    </style>
  </head>
  <body>
    <div id="ui">
      <button id="roll">Roll</button>
      <span id="result"></span>
    </div>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0f172a);

      const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(2.8, 2.2, 3.2);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      const hemi = new THREE.HemisphereLight(0xffffff, 0x223355, 1.0);
      scene.add(hemi);
      const dir = new THREE.DirectionalLight(0xffffff, 1.0);
      dir.position.set(5, 7, 4);
      scene.add(dir);

      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(20, 20),
        new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 1 })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = -1.2;
      scene.add(floor);

      function faceMaterial(text) {
        const c = document.createElement("canvas");
        c.width = 256; c.height = 256;
        const ctx = c.getContext("2d");
        ctx.fillStyle = "#f8fafc";
        ctx.fillRect(0, 0, c.width, c.height);
        ctx.fillStyle = "#0f172a";
        ctx.font = "bold 140px system-ui";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(String(text), 128, 140);
        const tex = new THREE.CanvasTexture(c);
        return new THREE.MeshStandardMaterial({ map: tex, roughness: 0.7, metalness: 0.0 });
      }

      // BoxGeometry faces order: +X, -X, +Y, -Y, +Z, -Z
      // We'll map numbers arbitrarily; you can remap to standard dice layout.
      const materials = [
        faceMaterial(3), // +X
        faceMaterial(4), // -X
        faceMaterial(1), // +Y (top)
        faceMaterial(6), // -Y (bottom)
        faceMaterial(2), // +Z
        faceMaterial(5), // -Z
      ];

      const dice = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), materials);
      dice.castShadow = false;
      scene.add(dice);

      // Target orientations for each result (1..6) so that that number is on +Y.
      // Because we mapped +Y face to number 1 above, we can derive others by rotating cube.
      const targets = new Map();
      {
        const q = new THREE.Quaternion();
        targets.set(1, q.clone());

        // 6 is on -Y -> rotate 180deg around X or Z
        targets.set(6, new THREE.Quaternion().setFromEuler(new THREE.Euler(Math.PI, 0, 0)));

        // 2 is on +Z -> rotate -90deg around X to bring +Z to +Y
        targets.set(2, new THREE.Quaternion().setFromEuler(new THREE.Euler(-Math.PI / 2, 0, 0)));

        // 5 is on -Z -> rotate +90deg around X
        targets.set(5, new THREE.Quaternion().setFromEuler(new THREE.Euler(Math.PI / 2, 0, 0)));

        // 3 is on +X -> rotate +90deg around Z to bring +X to +Y? Actually rotate -90 around Z: +X -> +Y
        targets.set(3, new THREE.Quaternion().setFromEuler(new THREE.Euler(0, 0, -Math.PI / 2)));

        // 4 is on -X -> rotate +90 around Z
        targets.set(4, new THREE.Quaternion().setFromEuler(new THREE.Euler(0, 0, Math.PI / 2)));
      }

      let anim = null;
      const resultEl = document.getElementById("result");
      document.getElementById("roll").addEventListener("click", () => {
        if (anim) return;

        const value = 1 + Math.floor(Math.random() * 6);
        resultEl.textContent = "";

        const startQ = dice.quaternion.clone();
        const targetQ = targets.get(value).clone();

        // Add a random extra spin around Y so it feels less robotic
        const extraSpin = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, Math.PI * 2 * (2 + Math.random() * 2), 0));
        targetQ.multiply(extraSpin);

        const t0 = performance.now();
        const spinMs = 900;
        const settleMs = 600;

        anim = { value, startQ, targetQ, t0, spinMs, settleMs };
      });

      function easeOutCubic(x) {
        return 1 - Math.pow(1 - x, 3);
      }

      function tick() {
        requestAnimationFrame(tick);

        if (anim) {
          const now = performance.now();
          const dt = now - anim.t0;

          if (dt < anim.spinMs) {
            // fast random spinning phase
            dice.rotation.x += 0.25;
            dice.rotation.y += 0.33;
            dice.rotation.z += 0.21;
            dice.position.y = 0.15 + 0.1 * Math.sin(dt / 80);
          } else {
            const t = Math.min(1, (dt - anim.spinMs) / anim.settleMs);
            const e = easeOutCubic(t);

            // settle: slerp to target
            THREE.Quaternion.slerp(anim.startQ, anim.targetQ, dice.quaternion, e);
            dice.position.y = 0;

            if (t >= 1) {
              resultEl.textContent = `Result: ${anim.value}`;
              anim = null;
            }
          }
        }

        renderer.render(scene, camera);
      }

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      tick();
    </script>
  </body>
</html>
